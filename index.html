<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>khaz’ website (offline)</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <style>
    :root {
        --bg-main: #000900;
        --mainffamily: "Courier New", monospace;
    }
    html {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background-color: var(--bg-main);
    }
    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: var(--bg-main);
        height: 100%;
        /* width: 95%; height: 100%; */

        color: darkseagreen;
    }

    div.main {
        display: flex;
        justify-content: center;
        align-items: center;
        border: solid 0.3em seagreen;
        width: 100%;
        height: 97%;
        margin: 0.5em;
        padding-left: 0.5em;
        padding-right: 0.5em;
    }

    div.container {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    #main-title {
        font-family: var(--mainffamily);
        font-size: 4em;
        text-align: center;
    }

    #sub-title {
        font-family: "Helvetica", "Arial", sans-serif;
        text-align: center;
    }

    img#khpng {
        opacity: 0.4;
        position: fixed;
        right: 0.9em;
        bottom: 0.9em;
        height: 4em;
    }
    </style>
  </head>

  <body>

    <!-- <script src="index.js"></script> -->
    <div class="main">
        <div class="container">
            <h1 id="main-title">khaz’ website</h1>
            <h2 id="sub-title">🚀 Launching in 5... 4... 3...</h2>
        </div>
        <img src="img/ktcf_wht.png" id="khpng">
    </div>

  </body>
</html>
